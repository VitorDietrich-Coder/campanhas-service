services:
  campanhas-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: campanhas-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=DB_Campanhas;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;

      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      RabbitMQ__DonationQueue: donations

      Jwt__Key: 5037baaf-7201-4b9c-b4dc-6c51306b18fa
      Jwt__Issuer: Campanhas.Service.Microservice
      Jwt__Audience: Campanhas.Service.Microservice

    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - app-network

  processador-doacoes-worker:
    build:
      context: .
      dockerfile: processador-doacoes-worker-service/Dockerfile
    container_name: processador-doacoes-worker
    environment:
      DOTNET_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=DB_Campanhas;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;

      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      RabbitMQ__DonationQueue: donations

    depends_on:
      - sqlserver
      - rabbitmq
      - campanhas-api
    networks:
      - app-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-campanhas
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-campanhas
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network

volumes:
  sqlserver_data:

networks:
  app-network:
    driver: bridge